name: Build APK from ZIP

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Unzip project
      run: unzip PHX_GitHub_Project.zip -d project_files

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: chmod +x project_files/gradlew

    - - name: Build APK
      run: |
        cd project_files
        gradle wrapper --gradle-version 8.0
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: PHX-Host-Modified-APK
        path: project_files/app/build/outputs/apk/debug/app-debug.apk
